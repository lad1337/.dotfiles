- defaults:
    link:
      relink: true
      force: true
- shell:
    - command: git submodule update --init --recursive
      description: Installing submodules
- clean:
    - "~"
- link:
    ~/.config/nvim: config/nvim
    ~/.config/direnv: config/direnv
    ~/.config/lazygit: config/lazygit
    ~/.config/bat: config/bat
    ~/.config/k9s: config/k9s
    ~/.gitconfig: .gitconfig
    ~/.gitignore: .gitignore
    ~/.p10k.zsh: .p10k.zsh
    ~/.zshrc: .zshrc
- create:
    - ~/downloads
    - ~/.vim/undo-history
    - ~/.nvm
- install-brew: true
- brew:
    - nvim
    - node
    - go
    - tree-sitter-cli
    - ripgrep
    - fzf
    - pipx
    - wget
    - tree
    - bat
    - coreutils
    - git-delta
    - grc
    - yq
    - lazygit
    - watch
    - kubectl
    - k9s
    - nvm
- shell:
    - command: curl -fsSL https://raw.githubusercontent.com/getnf/getnf/main/install.sh | bash
      description: Install get Nerdfont
    - command: getnf -i Hack
      description: Install Nerdfont Hack
    - command: chmod go-w '/opt/homebrew/share'
      description: Fix compinit 1
    - command: chmod -R go-w '/opt/homebrew/share/zsh'
      description: Fix compinit 2
    - command: '[ -d "$HOME/.oh-my-zsh" ] || sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'
      description: Install oh-my-zsh
    - command: git -C "${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/themes/powerlevel10k" pull || git clone --depth=1 https://github.com/romkatv/powerlevel10k.git "${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/themes/powerlevel10k"
      description: Install powerlevel10k
    - command: mkdir -p ~/.oh-my-zsh/custom/plugins/kubectl-autocomplete/
      description: Prepare kubectl-autocomplete
    - command: kubectl completion zsh > ~/.oh-my-zsh/custom/plugins/kubectl-autocomplete/kubectl-autocomplete.plugin.zsh
      description: Install kubectl-autocomplete
    - command: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      description: Install Rust and Cargo
    - command: pipx install uv
      description: Install uv
    - command: uv tool install uv-virtualenvwrapper
      description: Install uv-virtualenvwrapper
    - command: bat cache --build
      description: Build bat theme cache
    - command: source ~/.dotfiles/colors.sh && git config --global color.status.added "$COLOR_CYAN" && git config --global color.status.changed "$COLOR_YELLOW" && git config --global color.status.untracked "$COLOR_MAGENTA" && git config --global color.decorate.branch "$COLOR_CYAN" && git config --global color.decorate.remoteBranch "$COLOR_PURPLE" && git config --global color.decorate.tag "$COLOR_YELLOW" && git config --global color.decorate.HEAD "bold $COLOR_MAGENTA"
      description: Configure git colors
