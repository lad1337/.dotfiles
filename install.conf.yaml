- defaults:
    link:
      relink: true
      force: true

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- clean: ['~']

- link:
    ~/.config/nvim: config/nvim
    ~/.config/direnv: config/direnv
    ~/.config/lazygit: config/lazygit
    ~/.gitconfig: .gitconfig
    ~/.gitignore: .gitignore
    ~/.p10k.zsh: .p10k.zsh
    ~/.zshrc: .zshrc

- create:
    - ~/downloads
    - ~/.vim/undo-history

- install-brew: true

- brew:
    - node
    - ripgrep
    - pyenv
    - pipx
    - pyenv-virtualenv
    - wget
    - tree
    - bat
    - coreutils
    - git-delta
    - grc
    - yq
    - lazygit
    - watch
    - nvim

- shell:
    # - [LV_BRANCH='release-1.4/neovim-0.9' bash <(curl -s https://raw.githubusercontent.com/LunarVim/LunarVim/release-1.4/neovim-0.9/utils/installer/install.sh) --yes, Install LunarVim]
    - [curl -fsSL https://raw.githubusercontent.com/getnf/getnf/main/install.sh | bash, Install get Nerdfont]
    - [getnf -i Hack, Install Nerdfont Hack]
    - [chmod go-w '/opt/homebrew/share', Fix compinit 1]
    - [chmod -R go-w '/opt/homebrew/share/zsh', Fix compinit 2]
    - ['sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"', install powerlevel10k]
    - ['git clone --depth=1 https://github.com/romkatv/powerlevel10k.git "${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/themes/powerlevel10k"', install powerlevel10k]
